<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Communication Guidelines Quiz</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@400;500;700&display=swap">
<style>
  @font-face {
    font-family: 'Youth Black';
    src: url('https://storage.googleapis.com/pub-refurbed-com/CRM/Youth_Black/Youth-Black.woff2') format('woff2'),
         url('https://storage.googleapis.com/pub-refurbed-com/CRM/Youth_Black/Youth-Black.woff') format('woff');
    font-weight: 900;
    font-style: normal;
  }
</style>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Readex Pro', sans-serif; background: #f9f9f8; color: #1a1a1a; min-height: 100vh; display: flex; justify-content: center; padding: 2rem 1rem; }
  .container { width: 100%; max-width: 640px; }
  h1 { font-size: 20px; font-family: 'Youth Black', sans-serif; font-weight: 900; margin-bottom: 0.25rem; }
  .subtitle { font-size: 13px; color: #666; margin-bottom: 1.5rem; }
  .lang-bar { display: flex; gap: 8px; margin-bottom: 1.5rem; }
  .lang-btn { padding: 6px 16px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; color: #666; cursor: pointer; font-size: 13px; }
  .lang-btn.active { background: #eeecf9; color: #332E80; border-color: #332E80; font-weight: 500; }
  .progress-bar-bg { height: 4px; background: #e5e5e5; border-radius: 2px; margin-bottom: 1.5rem; }
  .progress-bar-fill { height: 4px; background: #332E80; border-radius: 2px; transition: width 0.3s; }
  .q-counter { font-size: 12px; color: #999; margin-bottom: 0.5rem; }
  .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 8px; margin-bottom: 8px; background: #eeecf9; color: #332E80; }
  .q-text { font-size: 16px; font-family: 'Youth Black', sans-serif; font-weight: 900; margin-bottom: 1.25rem; line-height: 1.5; }
  .options-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.5rem; }
  .opt-btn { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; color: #1a1a1a; cursor: pointer; font-size: 14px; text-align: left; transition: background 0.15s, border-color 0.15s; width: 100%; }
  .opt-btn:hover:not(:disabled) { background: #f5f5f3; border-color: #999; }
  .opt-btn:disabled { cursor: default; }
  .opt-label { width: 26px; height: 26px; border-radius: 50%; border: 0.5px solid #ccc; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; color: #666; }
  .opt-btn.correct { background: #eaf3de; border-color: #7ab84a; }
  .opt-btn.correct .opt-label { background: #eaf3de; border-color: #7ab84a; color: #3b6d11; }
  .opt-btn.correct .opt-text { color: #3b6d11; }
  .opt-btn.wrong { background: #fcebeb; border-color: #e24b4a; }
  .opt-btn.wrong .opt-label { background: #fcebeb; border-color: #e24b4a; color: #a32d2d; }
  .opt-btn.wrong .opt-text { color: #a32d2d; }
  .feedback-box { padding: 10px 14px; border-radius: 8px; font-size: 13px; line-height: 1.5; margin-bottom: 1rem; display: none; }
  .feedback-box.show { display: block; }
  .feedback-box.ok { background: #eeecf9; color: #332E80; border: 0.5px solid #7ab84a; }
  .feedback-box.no { background: #fcebeb; color: #a32d2d; border: 0.5px solid #e24b4a; }
  .nav-row { display: flex; justify-content: flex-end; }
  .next-btn { padding: 8px 20px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; color: #1a1a1a; cursor: pointer; font-size: 14px; display: none; }
  .next-btn.show { display: block; }
  .next-btn:hover { background: #f5f5f3; }
  .score-card { background: #f5f5f3; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; text-align: center; }
  .score-big { font-size: 40px; font-weight: 500; }
  .score-label { font-size: 13px; color: #666; margin-top: 4px; }
  .tag-pass { background: #eaf3de; color: #3b6d11; }
  .tag-fail { background: #fcebeb; color: #a32d2d; }
  .review-title { font-size: 14px; font-weight: 500; margin-bottom: 10px; }
  .review-item { border: 0.5px solid #e5e5e5; border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; background: #fff; }
  .review-q { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
  .review-row { font-size: 12px; margin-bottom: 3px; }
  .review-correct { color: #3b6d11; }
  .review-wrong { color: #a32d2d; }
  .review-explanation { font-size: 12px; color: #666; margin-top: 6px; padding-top: 6px; border-top: 0.5px solid #e5e5e5; line-height: 1.5; }
  .restart-btn { padding: 8px 20px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; color: #1a1a1a; cursor: pointer; font-size: 14px; margin-top: 1rem; }
  .restart-btn:hover { background: #f5f5f3; }
</style>
</head>
<body>
<div class="container">
  <h1>Communication Guidelines Quiz</h1>
  <p class="subtitle">refurbed seller training</p>
  <div id="app"></div>
</div>

<script>
const QUIZZES = {
  en: {
    lang: "English", next: "Next question", finish: "See results", restart: "Retake quiz",
    correct_msg: "Correct!", wrong_msg: "Not quite.", score_label: "questions correct",
    review_title: "Your answers", your_ans: "Your answer:", correct_ans: "Correct answer:",
    questions: [
      { topic:"Friendly & empathic communication", q:"What should you always do at the start of a customer message?", opts:["Jump straight to the solution","Thank the customer and apologize for the inconvenience","Tell the customer you will contact the responsible department","Forward the case to refurbed immediately"], correct:1, explanation:"You should thank the customer for contacting you and explicitly apologize for the inconvenience they're reporting." },
      { topic:"Friendly & empathic communication", q:"In which language should you respond to a customer?", opts:["Always in English","In your company's headquarter language","In the same language the customer used","In the most widely spoken market language"], correct:2, explanation:"Always use the same language the customer used to contact you." },
      { topic:"Tone of voice", q:"What is the refurbed tone of voice archetype?", opts:["Formal and corporate","Everyman — informal and eye-level","Expert and authoritative","Neutral and impersonal"], correct:1, explanation:"The refurbed tone of voice follows an 'everyman' approach — informal, eye-level, confident and reassuring." },
      { topic:"Tone of voice", q:"How should you normally address a customer?", opts:["By their surname, formally","By their first name, informally","With a generic 'Dear Customer'","By their order number"], correct:1, explanation:"Address customers as equals, by their first name and in an informal style — unless they explicitly request formal." },
      { topic:"Tone of voice", q:"Once you switch to a formal tone, what must you do?", opts:["Switch back to informal after one message","Use formal only in the first message","Keep the formal tone consistent throughout","Ask the customer again each time"], correct:2, explanation:"Once the tone is switched to formal, it must be used consistently for the rest of the conversation." },
      { topic:"Tone of voice", q:"Which type of language should you avoid?", opts:["Simple vocabulary","Technical jargon and complex vocabulary","Friendly greetings","Empathic expressions"], correct:1, explanation:"Avoid large vocabulary and technical jargon. Write with optimism and honesty instead." },
      { topic:"Positive communication", q:"What should you focus on to stay positive?", opts:["Explaining what you cannot do","Redirecting to refurbed support","Emphasizing what you CAN do","Keeping the message as short as possible"], correct:2, explanation:"Stay positive by emphasizing what you CAN do, using reliable committed expressions, and de-escalating where possible." },
      { topic:"Addressing the request", q:"When should you ask all clarifying questions?", opts:["After sending the initial solution","In your very first message","Only if the customer asks first","In a separate follow-up ticket"], correct:1, explanation:"Ask all clarifying questions in your first message to avoid long back-and-forth exchanges." },
      { topic:"Addressing the request", q:"Why must you not move communication outside the ticketing system?", opts:["It's slower for the customer","refurbed can't support either party if info isn't visible","It creates extra work for the seller","It violates data privacy laws"], correct:1, explanation:"refurbed won't be able to support the seller or customer if the information is not visible to them." },
      { topic:"Message structure", q:"What are the 6 elements of the recommended message formula?", opts:["Greeting, Opening, Problem summary, Options, Price, Signature","Introduction, Apology, Solution, Timeline, Disclaimer, Sign-off","Greeting, Opening, Explicit acknowledgement, Response/Solution, Final support offer, Farewell + Signature","Greeting, Order details, Explanation, Next steps, Signature"], correct:2, explanation:"The formula is: Greeting → Opening → Explicit acknowledgement → Response/Solution → Final offer for support → Farewell + Standard signature." }
    ]
  },
  de: {
    lang: "Deutsch", next: "Nächste Frage", finish: "Ergebnisse anzeigen", restart: "Quiz wiederholen",
    correct_msg: "Richtig!", wrong_msg: "Leider falsch.", score_label: "Fragen richtig beantwortet",
    review_title: "Deine Antworten", your_ans: "Deine Antwort:", correct_ans: "Richtige Antwort:",
    questions: [
      { topic:"Freundliche & empathische Kommunikation", q:"Was solltest du zu Beginn jeder Kundennachricht immer tun?", opts:["Direkt zur Lösung kommen","Dem Kunden danken und dich für die Unannehmlichkeiten entschuldigen","Dem Kunden mitteilen, dass du die zuständige Abteilung kontaktieren wirst","Den Fall sofort an refurbed weiterleiten"], correct:1, explanation:"Du solltest dem Kunden für die Kontaktaufnahme danken und dich ausdrücklich für die gemeldeten Unannehmlichkeiten entschuldigen." },
      { topic:"Freundliche & empathische Kommunikation", q:"In welcher Sprache solltest du einem Kunden antworten?", opts:["Immer auf Englisch","In der Sprache des Firmensitzes","In der Sprache, in der der Kunde dich kontaktiert hat","In der meistgesprochenen Sprache des Marktes"], correct:2, explanation:"Verwende immer dieselbe Sprache, in der der Kunde dich kontaktiert hat." },
      { topic:"Tonalität", q:"Was ist der Tonalitäts-Archetyp von refurbed?", opts:["Formell und unternehmerisch","Everyman – informell und auf Augenhöhe","Expertenhaft und autoritär","Neutral und unpersönlich"], correct:1, explanation:"Die refurbed Tonalität folgt einem 'Everyman'-Ansatz – informell, auf Augenhöhe, selbstbewusst und beruhigend für Kunden." },
      { topic:"Tonalität", q:"Wie solltest du einen Kunden normalerweise ansprechen?", opts:["Mit Nachnamen und formell","Mit Vornamen und informell","Mit einer allgemeinen Anrede wie 'Sehr geehrter Kunde'","Mit der Bestellnummer"], correct:1, explanation:"Kunden werden als Gleichgestellte mit Vornamen und informell angesprochen – außer der Kunde wünscht ausdrücklich Formalität." },
      { topic:"Tonalität", q:"Was musst du tun, wenn du zum formellen Ton wechselst?", opts:["Nach einer Nachricht wieder zum informellen Ton wechseln","Den formellen Ton nur in der ersten Nachricht verwenden","Den formellen Ton konsequent beibehalten","Den Kunden jedes Mal erneut fragen"], correct:2, explanation:"Sobald der formelle Ton eingeführt wurde, muss er konsequent für das gesamte Gespräch verwendet werden." },
      { topic:"Tonalität", q:"Welche Art von Sprache solltest du vermeiden?", opts:["Einfache Sprache","Fachjargon und komplexes Vokabular","Freundliche Begrüßungen","Empathische Ausdrücke"], correct:1, explanation:"Vermeide umfangreiches Vokabular und Fachjargon. Schreibe stattdessen optimistisch und ehrlich." },
      { topic:"Positive Kommunikation", q:"Worauf solltest du dich konzentrieren, um positiv zu bleiben?", opts:["Erklären, was du nicht tun kannst","Den Kunden an refurbed weiterleiten","Betonen, was du TUN KANNST","Die Nachricht so kurz wie möglich halten"], correct:2, explanation:"Bleibe positiv, indem du betonst, was du TUN KANNST, zuverlässige Ausdrücke verwendest und deeskalierst." },
      { topic:"Auf Anfragen eingehen", q:"Wann solltest du alle Rückfragen stellen?", opts:["Nach dem Senden der ersten Lösung","In deiner allerersten Nachricht","Nur wenn der Kunde zuerst darum bittet","In einem separaten Folge-Ticket"], correct:1, explanation:"Alle Rückfragen sollten in der ersten Nachricht gestellt werden, um lange Hin-und-Her-Kommunikation zu vermeiden." },
      { topic:"Auf Anfragen eingehen", q:"Warum darf die Kommunikation nicht außerhalb des Ticketsystems stattfinden?", opts:["Es ist langsamer für den Kunden","refurbed kann nicht helfen, wenn die Infos nicht sichtbar sind","Es erzeugt mehr Arbeit für den Verkäufer","Es verstößt gegen Datenschutzgesetze"], correct:1, explanation:"refurbed kann den Verkäufer oder Kunden nicht unterstützen, wenn die Informationen nicht sichtbar sind." },
      { topic:"Nachrichtenstruktur", q:"Was sind die 6 Elemente der empfohlenen Nachrichtenformel?", opts:["Begrüßung, Eröffnung, Problemzusammenfassung, Optionen, Preis, Unterschrift","Einleitung, Entschuldigung, Lösung, Zeitplan, Haftungsausschluss, Abschluss","Begrüßung, Eröffnung, Explizite Anerkennung, Antwort/Lösung, Abschließendes Supportangebot, Verabschiedung + Unterschrift","Begrüßung, Bestelldetails, Erklärung, Nächste Schritte, Unterschrift"], correct:2, explanation:"Die Formel lautet: Begrüßung → Eröffnung → Explizite Anerkennung → Antwort/Lösung → Abschließendes Supportangebot → Verabschiedung + Standardunterschrift." }
    ]
  },
  it: {
    lang: "Italiano", next: "Prossima domanda", finish: "Vedi risultati", restart: "Rifai il quiz",
    correct_msg: "Corretto!", wrong_msg: "Non esatto.", score_label: "domande corrette",
    review_title: "Le tue risposte", your_ans: "La tua risposta:", correct_ans: "Risposta corretta:",
    questions: [
      { topic:"Comunicazione amichevole ed empatica", q:"Cosa dovresti sempre fare all'inizio di ogni messaggio al cliente?", opts:["Passare direttamente alla soluzione","Ringraziare il cliente e scusarsi per il disagio","Dire al cliente che contatterai il reparto responsabile","Trasferire il caso a refurbed immediatamente"], correct:1, explanation:"Devi ringraziare il cliente per averti contattato e scusarti esplicitamente per il disagio segnalato." },
      { topic:"Comunicazione amichevole ed empatica", q:"In quale lingua dovresti rispondere a un cliente?", opts:["Sempre in inglese","Nella lingua della sede aziendale","Nella stessa lingua usata dal cliente","Nella lingua più parlata nel mercato"], correct:2, explanation:"Usa sempre la stessa lingua in cui il cliente ti ha contattato." },
      { topic:"Tono di voce", q:"Qual è l'archetipo del tono di voce di refurbed?", opts:["Formale e aziendale","Everyman – informale e alla pari","Esperto e autorevole","Neutro e impersonale"], correct:1, explanation:"Il tono di voce di refurbed segue un approccio 'everyman' – informale, alla pari, sicuro e rassicurante per i clienti." },
      { topic:"Tono di voce", q:"Come dovresti normalmente rivolgerti a un cliente?", opts:["Con il cognome e formalmente","Con il nome di battesimo e informalmente","Con un generico 'Gentile Cliente'","Con il numero d'ordine"], correct:1, explanation:"Rivolgiti ai clienti come pari, con il loro nome di battesimo e in stile informale, a meno che non richiedano il formale." },
      { topic:"Tono di voce", q:"Una volta passato al tono formale, cosa devi fare?", opts:["Tornare all'informale dopo un messaggio","Usare il formale solo nel primo messaggio","Mantenere il tono formale in modo coerente","Chiedere nuovamente al cliente ogni volta"], correct:2, explanation:"Una volta introdotto il tono formale, deve essere usato in modo coerente per tutta la conversazione." },
      { topic:"Tono di voce", q:"Quale tipo di linguaggio dovresti evitare?", opts:["Linguaggio semplice","Gergo tecnico e vocabolario complesso","Saluti amichevoli","Espressioni empatiche"], correct:1, explanation:"Evita vocabolario eccessivo e gergo tecnico. Scrivi invece con ottimismo e onestà." },
      { topic:"Comunicazione positiva", q:"Su cosa dovresti concentrarti per mantenere un tono positivo?", opts:["Spiegare cosa non puoi fare","Reindirizzare il cliente a refurbed","Sottolineare ciò che PUOI fare","Mantenere il messaggio il più breve possibile"], correct:2, explanation:"Mantieni un tono positivo concentrandoti su ciò che PUOI fare, usando espressioni affidabili e de-escalando dove possibile." },
      { topic:"Gestione delle richieste", q:"Quando dovresti porre tutte le domande di chiarimento?", opts:["Dopo aver inviato la prima soluzione","Nel tuo primo messaggio","Solo se il cliente lo chiede prima","In un ticket di follow-up separato"], correct:1, explanation:"Poni tutte le domande di chiarimento nel primo messaggio per evitare lunghi scambi." },
      { topic:"Gestione delle richieste", q:"Perché non devi spostare la comunicazione fuori dal sistema di ticketing?", opts:["È più lento per il cliente","refurbed non può supportare nessuno se le info non sono visibili","Crea lavoro extra per il venditore","Va contro le leggi sulla privacy"], correct:1, explanation:"refurbed non può supportare il venditore o il cliente se le informazioni non sono visibili." },
      { topic:"Struttura del messaggio", q:"Quali sono i 6 elementi della formula di messaggio consigliata?", opts:["Saluto, Apertura, Riepilogo problema, Opzioni, Prezzo, Firma","Introduzione, Scuse, Soluzione, Tempistiche, Disclaimer, Chiusura","Saluto, Apertura, Riconoscimento esplicito, Risposta/Soluzione, Offerta supporto finale, Congedo + Firma","Saluto, Dettagli ordine, Spiegazione, Prossimi passi, Firma"], correct:2, explanation:"La formula è: Saluto → Apertura → Riconoscimento esplicito → Risposta/Soluzione → Offerta finale di supporto → Congedo + Firma standard." }
    ]
  }
};

let currentLang='en', currentQ=0, answered=false, userAnswers=[], quizDone=false;
function getQuiz(){return QUIZZES[currentLang];}

function renderLangBar(){
  return '<div class="lang-bar">'+Object.keys(QUIZZES).map(k=>
    '<button class="lang-btn'+(k===currentLang?' active':'')+'" onclick="switchLang(\''+k+'\')">'+QUIZZES[k].lang+'</button>'
  ).join('')+'</div>';
}

function renderQuiz(){
  const quiz=getQuiz();
  if(quizDone){renderResults();return;}
  const q=quiz.questions[currentQ], total=quiz.questions.length;
  const pct=((currentQ)/total*100).toFixed(0), isLast=currentQ===total-1;
  const labels=['A','B','C','D'];
  let html=renderLangBar();
  html+='<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:'+pct+'%"></div></div>';
  html+='<div class="q-counter">'+(currentQ+1)+' / '+total+'</div>';
  html+='<div class="tag">'+q.topic+'</div>';
  html+='<div class="q-text">'+q.q+'</div>';
  html+='<div class="options-grid">';
  q.opts.forEach((opt,i)=>{
    let cls='';
    if(answered){if(i===q.correct)cls='correct';else if(userAnswers[currentQ]===i)cls='wrong';}
    html+='<button class="opt-btn '+cls+'" onclick="selectAnswer('+i+')" '+(answered?'disabled':'')+'>'
      +'<span class="opt-label">'+labels[i]+'</span>'
      +'<span class="opt-text">'+opt+'</span>'
      +'</button>';
  });
  html+='</div>';
  if(answered){
    const ok=userAnswers[currentQ]===q.correct;
    html+='<div class="feedback-box show '+(ok?'ok':'no')+'"><strong>'+(ok?quiz.correct_msg:quiz.wrong_msg)+'</strong> '+q.explanation+'</div>';
  }
  html+='<div class="nav-row"><button class="next-btn'+(answered?' show':'')+'" onclick="nextQuestion()">'+(isLast?quiz.finish:quiz.next)+' &#8594;</button></div>';
  document.getElementById('app').innerHTML=html;
}

function renderResults(){
  const quiz=getQuiz(), total=quiz.questions.length;
  const score=userAnswers.filter((a,i)=>a===quiz.questions[i].correct).length;
  const pct=Math.round(score/total*100), pass=pct>=70;
  const labels=['A','B','C','D'];
  let html=renderLangBar();
  html+='<div class="score-card"><div class="score-big">'+score+' / '+total+'</div><div class="score-label">'+pct+'% — '+score+' '+quiz.score_label+'</div><div style="margin-top:10px"><span class="tag '+(pass?'tag-pass':'tag-fail')+'">'+(pass?'✓ Pass':'✗ Needs review')+'</span></div></div>';
  html+='<div class="review-title">'+quiz.review_title+'</div>';
  quiz.questions.forEach((q,i)=>{
    const ok=userAnswers[i]===q.correct;
    html+='<div class="review-item"><div class="review-q">'+(i+1)+'. '+q.q+'</div>';
    if(!ok)html+='<div class="review-row review-wrong">✗ '+quiz.your_ans+' '+labels[userAnswers[i]]+'. '+q.opts[userAnswers[i]]+'</div>';
    html+='<div class="review-row review-correct">✓ '+quiz.correct_ans+' '+labels[q.correct]+'. '+q.opts[q.correct]+'</div>';
    if(!ok)html+='<div class="review-explanation">'+q.explanation+'</div>';
    html+='</div>';
  });
  html+='<button class="restart-btn" onclick="restartQuiz()">'+quiz.restart+'</button>';
  document.getElementById('app').innerHTML=html;
}

function selectAnswer(i){if(answered)return;answered=true;userAnswers[currentQ]=i;renderQuiz();}
function nextQuestion(){const t=getQuiz().questions.length;if(currentQ<t-1){currentQ++;answered=false;renderQuiz();}else{quizDone=true;renderResults();}}
function switchLang(l){currentLang=l;currentQ=0;answered=false;userAnswers=[];quizDone=false;renderQuiz();}
function restartQuiz(){currentQ=0;answered=false;userAnswers=[];quizDone=false;renderQuiz();}
renderQuiz();
</script>
</body>
</html>
