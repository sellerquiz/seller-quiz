<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Readex Pro', sans-serif; background: #f9f9f8; color: #1a1a1a; min-height: 100vh; display: flex; justify-content: center; padding: 2rem 1rem; }
  .container { width: 100%; max-width: 680px; }
  h1 { font-size: 20px; font-family: 'Youth Black', sans-serif; font-weight: 900; margin-bottom: 0.25rem; }

  .main-tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 0.5px solid #e5e5e5; }
  .main-tab { padding: 8px 20px; border: 0.5px solid transparent; border-bottom: none; background: transparent; color: #666; cursor: pointer; font-size: 14px; font-family: 'Readex Pro', sans-serif; border-radius: 8px 8px 0 0; }
  .main-tab.active { background: #fff; color: #332E80; border-color: #e5e5e5; font-weight: 500; margin-bottom: -0.5px; }

  .lang-btn { padding: 6px 16px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; color: #666; cursor: pointer; font-size: 13px; font-family: 'Readex Pro', sans-serif; }
  .lang-btn.active { background: #eeecf9; color: #332E80; border-color: #332E80; font-weight: 500; }
  .progress-bar-bg { height: 4px; background: #e5e5e5; border-radius: 2px; margin-bottom: 1.5rem; }
  .progress-bar-fill { height: 4px; background: #332E80; border-radius: 2px; transition: width 0.3s; }
  .q-counter { font-size: 12px; color: #999; margin-bottom: 0.5rem; }
  .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 8px; margin-bottom: 8px; background: #eeecf9; color: #332E80; }
  .q-text { font-size: 16px; font-family: 'Readex Pro', sans-serif; font-weight: 400; margin-bottom: 1.25rem; line-height: 1.5; }
  .options-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.5rem; }
  .opt-btn { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; color: #1a1a1a; cursor: pointer; font-size: 14px; text-align: left; transition: background 0.15s, border-color 0.15s; width: 100%; font-family: 'Readex Pro', sans-serif; }
  .opt-btn:hover:not(:disabled) { background: #f5f5f3; border-color: #999; }
  .opt-btn:disabled { cursor: default; }
  .opt-label { width: 26px; height: 26px; border-radius: 50%; border: 0.5px solid #ccc; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; color: #666; }
  .opt-btn.correct { background: #eaf3de; border-color: #7ab84a; }
  .opt-btn.correct .opt-label { background: #eaf3de; border-color: #7ab84a; color: #3b6d11; }
  .opt-btn.correct .opt-text { color: #3b6d11; }
  .opt-btn.wrong { background: #fcebeb; border-color: #e24b4a; }
  .opt-btn.wrong .opt-label { background: #fcebeb; border-color: #e24b4a; color: #a32d2d; }
  .opt-btn.wrong .opt-text { color: #a32d2d; }
  .feedback-box { padding: 10px 14px; border-radius: 8px; font-size: 13px; line-height: 1.5; margin-bottom: 1rem; display: none; }
  .feedback-box.show { display: block; }
  .feedback-box.ok { background: #eeecf9; color: #332E80; border: 0.5px solid #332E80; }
  .feedback-box.no { background: #fcebeb; color: #a32d2d; border: 0.5px solid #e24b4a; }
  .nav-row { display: flex; justify-content: flex-end; }
  .next-btn { padding: 8px 20px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; color: #1a1a1a; cursor: pointer; font-size: 14px; display: none; font-family: 'Readex Pro', sans-serif; }
  .next-btn.show { display: block; }
  .next-btn:hover { background: #f5f5f3; }
  .score-card { background: #f5f5f3; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; text-align: center; }
  .score-big { font-size: 40px; font-weight: 500; }
  .score-label { font-size: 13px; color: #666; margin-top: 4px; }
  .tag-pass { background: #eaf3de; color: #3b6d11; }
  .tag-fail { background: #fcebeb; color: #a32d2d; }
  .cta-box { border-radius: 8px; padding: 12px 14px; margin-bottom: 1.25rem; font-size: 13px; line-height: 1.8; }
  .cta-box.pass { background: #eeecf9; color: #332E80; border: 0.5px solid #332E80; }
  .cta-box.fail { background: #fcebeb; color: #a32d2d; border: 0.5px solid #e24b4a; }
  .cta-box a { color: inherit; font-weight: 500; display: block; margin-top: 6px; }
  .review-title { font-size: 14px; font-weight: 500; margin-bottom: 10px; }
  .review-item { border: 0.5px solid #e5e5e5; border-radius: 8px; margin-bottom: 8px; background: #fff; overflow: hidden; }
  .review-item-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; cursor: pointer; font-size: 13px; }
  .review-item-header:hover { background: #f5f5f3; }
  .review-item-status { font-size: 12px; font-weight: 500; flex-shrink: 0; margin-left: 8px; }
  .review-item-status.ok { color: #3b6d11; }
  .review-item-status.no { color: #a32d2d; }
  .review-item-body { padding: 0 14px 10px; border-top: 0.5px solid #e5e5e5; display: none; }
  .review-item-body.open { display: block; }
  .review-row { font-size: 12px; margin-bottom: 3px; margin-top: 8px; }
  .review-correct { color: #3b6d11; }
  .review-wrong { color: #a32d2d; }
  .review-explanation { font-size: 12px; color: #666; margin-top: 6px; padding-top: 6px; border-top: 0.5px solid #e5e5e5; line-height: 1.5; }
  .restart-btn { padding: 8px 20px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; color: #1a1a1a; cursor: pointer; font-size: 14px; margin-top: 1rem; font-family: 'Readex Pro', sans-serif; }
  .restart-btn:hover { background: #f5f5f3; }
  .ex-wrap { padding: 0.5rem 0; }
  .ex-progress-bg { height: 4px; background: #e5e5e5; border-radius: 2px; margin-bottom: 1.5rem; }
  .ex-progress-fill { height: 4px; background: #332E80; border-radius: 2px; transition: width 0.3s; }
  .ex-counter { font-size: 12px; color: #999; margin-bottom: 0.5rem; }
  .ex-title { font-size: 15px; font-weight: 500; color: #1a1a1a; margin-bottom: 0.5rem; }
  .ex-instruction { font-size: 13px; color: #666; margin-bottom: 1.25rem; line-height: 1.5; }
  .email-shell { background: #fff; border: 0.5px solid #e5e5e5; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.25rem; font-size: 14px; line-height: 1.8; }
  .email-part { display: block; padding: 3px 6px; border-radius: 4px; background: #f5f5f3; margin: 2px 0; cursor: pointer; transition: background 0.15s; position: relative; white-space: pre-line; }
  .email-part:hover { background: #eceae6; }
  .email-part.found { background: #eaf3de; color: #1a1a1a; }
  .email-spacer { display: block; height: 10px; }
  .popup-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
  .popup-overlay.show { display: flex; }
  .popup-box { background: #fff; border-radius: 12px; padding: 1.5rem; max-width: 480px; width: 100%; border: 0.5px solid #e5e5e5; max-height: 80vh; overflow-y: auto; }
  .popup-improved-label { font-size: 11px; font-weight: 500; color: #3b6d11; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .popup-improved-text { font-size: 13px; color: #3b6d11; background: #eaf3de; border-radius: 8px; padding: 10px 12px; margin-bottom: 1rem; line-height: 1.7; white-space: pre-line; }
  .popup-correct-text { font-size: 13px; color: #3b6d11; background: #eaf3de; border-radius: 8px; padding: 10px 12px; margin-bottom: 1rem; line-height: 1.7; display: none; }
  .popup-why-label { font-size: 11px; font-weight: 500; color: #332E80; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .popup-why-text { font-size: 13px; color: #1a1a1a; line-height: 1.6; margin-bottom: 1rem; }
  .popup-close { padding: 7px 18px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; color: #1a1a1a; cursor: pointer; font-size: 13px; font-family: 'Readex Pro', sans-serif; }
  .popup-close:hover { background: #f5f5f3; }
  .ex-bottom-row { display: flex; justify-content: space-between; align-items: center; margin-top: 0.5rem; }
  .reveal-btn { padding: 7px 16px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; color: #666; cursor: pointer; font-size: 13px; font-family: 'Readex Pro', sans-serif; }
  .reveal-btn:hover { background: #f5f5f3; }
  .ex-next-btn { padding: 8px 20px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; color: #aaa; font-size: 14px; font-family: 'Readex Pro', sans-serif; cursor: not-allowed; }
  .ex-next-btn.unlocked { color: #1a1a1a; cursor: pointer; }
  .ex-next-btn.unlocked:hover { background: #f5f5f3; }
  .done-screen { text-align: center; padding: 3rem 1rem; }
  .done-screen h2 { font-family: 'Youth Black', sans-serif; font-size: 24px; font-weight: 900; color: #332E80; margin-bottom: 1rem; }
  .done-screen p { font-size: 15px; color: #666; margin-bottom: 2rem; line-height: 1.6; }
</style>
</head>

  <p class="subtitle">refurbed seller training</p>

    <button class="main-tab active" onclick="switchMainTab('quiz')">Quiz</button>
    <button class="main-tab" onclick="switchMainTab('examples')">Email examples</button>
  </div>
  <div id="tab-quiz" class="tab-content active"><div id="app"></div></div>
  <div id="tab-examples" class="tab-content"><div id="ex-app"></div></div>
</div>

<div class="popup-overlay" id="popup" onclick="closePopup(event)">

    <div class="popup-improved-label" id="popup-improved-label"></div>

<script>
const GUIDELINES_URL='https://app.notion.com/p/refurbed/Communication-Guidelines-55df3c6aebe14ba5bdd537992f822322';
const SELLER_INFO_URL='https://app.notion.com/p/refurbed/Seller-Information-46c12652deb84c65964f1594a54782bf';

const QUIZZES={
  en:{
    lang:"English",next:"Next question",finish:"See results",restart:"Retake quiz",
    correct_msg:"Correct!",wrong_msg:"Not quite.",
    score_label:"questions correct",
    review_title:"Your answers",
    your_ans:"Your answer:",correct_ans:"Correct answer:",
    cta_pass:"Great work! Keep these guidelines in mind every time you write to a customer.",
    cta_fail:"We recommend reviewing the following resources before retaking the quiz.",
    cta_link:"Open Communication Guidelines",
    cta_link2:"Open Seller Information",
    questions:[
      {topic:"Opening a message",q:"A customer writes in to say their laptop arrived with a cracked screen. What is the best opening sentence?",opts:["We have received your message regarding the laptop.","Thank you for reaching out to us. We are sorry to hear your laptop arrived with a cracked screen, we can imagine how frustrating that must be.","Please send photos of the damage so we can assess the situation.","The laptop will need to be returned before we can process a replacement."],correct:1,explanation:"The opening should thank the customer and acknowledge the issue with empathy before anything else."},
      {topic:"Language",q:"A customer writes to you in Dutch. What should you do?",opts:["Reply in English, as it is the standard business language","Reply in the language of your company's headquarters","Reply in Dutch, matching the customer's language","Ask the customer which language they prefer"],correct:2,explanation:"Always reply in the same language the customer used to contact you."},
      {topic:"Addressing the customer",q:"A customer named James Walker contacts you. How should you address him?",opts:["Dear Mr. Walker,","Dear Customer,","Hello James,","Hi there,"],correct:2,explanation:"Always use the customer's first name and an informal tone, unless they explicitly request formal."},
      {topic:"Positive language",q:"A customer asks if their item can be replaced. Which is the best response?",opts:["We cannot guarantee a replacement until the item has been inspected.","Replacements are only possible under certain conditions.","We would be happy to arrange a replacement for you once we have reviewed the item.","You may be eligible for a replacement depending on the outcome of the inspection."],correct:2,explanation:"Focus on what you CAN do, using committed and reliable language. Avoid 'cannot', 'only possible' and 'may be eligible'."},
      {topic:"Tone of voice",q:"A customer requests to be addressed formally. What should you do?",opts:["Use formal tone in the first message only, then switch back to informal","Ask the customer again in the next message to confirm their preference","Switch to formal tone and keep it consistent for the rest of the conversation","Continue with informal tone as it is the refurbed standard"],correct:2,explanation:"Once the tone is switched to formal on the customer's request, it must stay formal consistently."},
      {topic:"Clarifying questions",q:"A customer reports that their phone is not working but gives no further details. What should you do?",opts:["Ask for more details in a follow-up message after sending an initial response","Ask all clarifying questions in your first message to avoid long back-and-forth","Send a standard troubleshooting guide and wait for the customer to respond","Forward the case to refurbed support immediately"],correct:1,explanation:"Ask all clarifying questions in your first message to avoid unnecessary back-and-forth."},
      {topic:"Zendesk",q:"A customer's device is not working and you need more information to resolve the issue. What should you do?",opts:["Ask the customer to send photos and videos to your company email so the process is faster","Ask the customer to contact you on WhatsApp for a quicker resolution","Ask for all the information you need directly within Zendesk, in your first message","Call the customer to get the details over the phone"],correct:2,explanation:"Always keep communication within Zendesk. Never ask customers to contact you outside of the system — on company email, WhatsApp, or any other channel. refurbed cannot support either party if the information is not visible to them."},
      {topic:"Message structure",q:"Which of the following is the correct order for a customer service message?",opts:["Solution, Greeting, Apology, Farewell","Greeting, Opening, Explicit acknowledgement, Response/Solution, Final support offer, Farewell + Signature","Greeting, Problem summary, Options, Price, Signature","Opening, Apology, Timeline, Disclaimer, Sign-off"],correct:1,explanation:"The recommended formula is: Greeting, Opening, Explicit acknowledgement, Response/Solution, Final offer for support, Farewell + Signature."},
      {topic:"Paragraph structure",q:"A customer receives this reply: 'Hello Anna, thank you for your message. We have received your return and our team is inspecting it. Your refund will be processed within 3 to 5 business days and you will receive a confirmation email. Please reach out if you have any questions. Have a great day! Kind regards, Sofia, TechSeller GmbH.' What is wrong with this message?",opts:["The tone is too informal","The signature is missing the company name","There are no empty lines between the paragraphs","Nothing — this message is correct"],correct:2,explanation:"Each paragraph should be separated by an empty line so the message is easy to follow."},
      {topic:"Avoiding jargon",q:"A customer asks about the status of their case. Which response uses the best language?",opts:["Your ticket has been escalated to our technical department for further assessment.","Your request is currently being reviewed by our team and we will get back to you within 24 hours.","The aforementioned issue has been logged and will be processed in due course.","We have initiated the resolution procedure for your case."],correct:1,explanation:"Avoid internal technical terms like 'ticket' when writing to customers — use 'request' instead. Avoid vague expressions like 'in due course' and give a concrete timeline instead. Option D is also incorrect — 'initiated the resolution procedure' is unnecessarily complex jargon that customers are unlikely to understand."},
      {topic:"Farewell and signature",q:"Which of the following is the best way to close a customer message?",opts:["Yours sincerely, Sofia","Regards","Have a great rest of your day! Kind regards, Sofia, TechSeller GmbH","Thank you for your patience. We will be in touch."],correct:2,explanation:"Always end with a warm farewell phrase and include your full signature with your name and company name."},
      {topic:"Reliable language",q:"A customer asks when their refund will arrive. Which is the best response?",opts:["Your refund should arrive within a few days.","We would expect the refund to be processed at some point next week.","Your refund will be processed within 3 to 5 business days and you will receive a confirmation email.","Refunds are typically issued after inspection but timelines may vary."],correct:2,explanation:"Use committed, reliable language and give a specific timeline. Avoid 'should', 'would expect' and 'may vary'."},
      {topic:"De-escalation",q:"A customer writes in saying they are very frustrated and demands an immediate refund. What is the best approach?",opts:["Explain the refund policy in detail and list all the conditions that must be met","Apologise, acknowledge their frustration, and explain clearly what you can do and by when","Ask the customer to calm down before you can assist them","Forward the case to refurbed support immediately"],correct:1,explanation:"De-escalate by acknowledging the frustration with empathy, then focus on what you CAN do and give a clear timeline."},
      {topic:"Explaining next steps",q:"After arranging a return, which closing paragraph is best?",opts:["We will be in touch once we have more information.","Please wait for further updates.","Once we receive the item, we will inspect it and get back to you within 3 business days with a solution. Feel free to reach out if you have any questions in the meantime.","The return is now in progress. No further action is needed from your side."],correct:2,explanation:"Always describe the next steps clearly, give a realistic timeline, and offer further support."},
      {topic:"Spelling and grammar",q:"Why is it important to check your message for grammar and spelling errors before sending?",opts:["refurbed's system automatically corrects errors so it is not necessary","Errors make the message look unprofessional and can damage the customer's trust in the seller","Grammar errors only matter in formal messages","It is only important if the customer is a native speaker"],correct:1,explanation:"All messages should be free of grammar and spelling errors. Errors undermine professionalism and customer trust."}
    ]
  },
  de:{
    lang:"Deutsch",next:"Nächste Frage",finish:"Ergebnisse anzeigen",restart:"Quiz wiederholen",
    correct_msg:"Richtig!",wrong_msg:"Nicht ganz richtig.",
    score_label:"Fragen richtig beantwortet",
    review_title:"Deine Antworten",
    your_ans:"Deine Antwort:",correct_ans:"Richtige Antwort:",
    cta_pass:"Gut gemacht! Denke bei jeder Nachricht an einen Kunden an diese Richtlinien.",
    cta_fail:"Wir empfehlen, die folgenden Ressourcen zu lesen, bevor du das Quiz wiederholst.",
    cta_link:"Kommunikationsrichtlinien öffnen",
    cta_link2:"Verkäuferinformationen öffnen",
    questions:[
      {topic:"Beginn einer Nachricht",q:"Ein Kunde schreibt, dass sein Laptop mit einem gebrochenen Bildschirm angekommen ist. Was ist der beste Eröffnungssatz?",opts:["Wir haben Ihre Nachricht bezüglich des Laptops erhalten.","Vielen Dank, dass du dich an uns gewandt hast. Es tut uns leid zu hören, dass dein Laptop mit einem gebrochenen Bildschirm angekommen ist, wir können uns vorstellen, wie frustrierend das sein muss.","Bitte sende uns Fotos des Schadens, damit wir die Situation beurteilen können.","Der Laptop muss zurückgeschickt werden, bevor wir einen Ersatz bearbeiten können."],correct:1,explanation:"Die Eröffnung sollte dem Kunden danken und das Problem mit Empathie anerkennen, bevor etwas anderes gesagt wird."},
      {topic:"Sprache",q:"Ein Kunde schreibt dir auf Niederländisch. Was solltest du tun?",opts:["Auf Englisch antworten, da es die Standard-Geschäftssprache ist","In der Sprache des Firmensitzes antworten","Auf Niederländisch antworten, der Sprache des Kunden","Den Kunden fragen, welche Sprache er bevorzugt"],correct:2,explanation:"Antworte immer in der Sprache, in der der Kunde dich kontaktiert hat."},
      {topic:"Kundenansprache",q:"Ein Kunde namens Thomas Müller kontaktiert dich. Wie solltest du ihn ansprechen?",opts:["Sehr geehrter Herr Müller,","Sehr geehrter Kunde,","Hallo Thomas,","Hallo,"],correct:2,explanation:"Verwende immer den Vornamen des Kunden und einen informellen Ton, es sei denn, der Kunde wünscht ausdrücklich eine formelle Ansprache."},
      {topic:"Positive Sprache",q:"Ein Kunde fragt, ob sein Artikel ersetzt werden kann. Was ist die beste Antwort?",opts:["Wir können einen Ersatz erst garantieren, nachdem der Artikel inspiziert wurde.","Ersatz ist nur unter bestimmten Bedingungen möglich.","Wir helfen dir gerne dabei, einen Ersatz zu arrangieren, nachdem wir den Artikel geprüft haben.","Du könntest je nach Ergebnis der Inspektion Anspruch auf einen Ersatz haben."],correct:2,explanation:"Konzentriere dich auf das, was du TUN KANNST, mit zuverlässiger und verbindlicher Sprache. Vermeide 'können nicht', 'nur möglich' und 'könntest Anspruch haben'."},
      {topic:"Tonalität",q:"Ein Kunde bittet darum, formell angesprochen zu werden. Was solltest du tun?",opts:["Den formellen Ton nur in der ersten Nachricht verwenden, dann zurück zum informellen wechseln","Den Kunden in der nächsten Nachricht erneut nach seiner Präferenz fragen","Zum formellen Ton wechseln und ihn konsequent für den Rest des Gesprächs beibehalten","Den informellen Ton beibehalten, da es der refurbed-Standard ist"],correct:2,explanation:"Sobald auf Wunsch des Kunden zum formellen Ton gewechselt wird, muss dieser konsequent beibehalten werden."},
      {topic:"Rückfragen",q:"Ein Kunde meldet, dass sein Telefon nicht funktioniert, gibt aber keine weiteren Details an. Was solltest du tun?",opts:["In einer Folgenachricht nach weiteren Details fragen, nachdem eine erste Antwort gesendet wurde","Alle Rückfragen in deiner ersten Nachricht stellen, um lange Hin-und-Her-Kommunikation zu vermeiden","Einen Standard-Leitfaden zur Fehlerbehebung senden und auf die Antwort des Kunden warten","Den Fall sofort an den refurbed Support weiterleiten"],correct:1,explanation:"Stelle alle Rückfragen in deiner ersten Nachricht, um unnötiges Hin und Her zu vermeiden."},
      {topic:"Zendesk",q:"Das Gerät eines Kunden funktioniert nicht und du benötigst weitere Informationen. Was solltest du tun?",opts:["Den Kunden bitten, Fotos und Videos an deine Firmen-E-Mail zu senden, damit es schneller geht","Den Kunden bitten, dich über WhatsApp zu kontaktieren","Alle benötigten Informationen direkt in Zendesk anfragen, in deiner ersten Nachricht","Den Kunden anrufen, um die Details telefonisch zu erhalten"],correct:2,explanation:"Halte die gesamte Kommunikation immer in Zendesk. Bitte Kunden niemals, dich außerhalb des Systems zu kontaktieren — per Firmen-E-Mail, WhatsApp oder einem anderen Kanal. refurbed kann weder den Verkäufer noch den Kunden unterstützen, wenn die Informationen nicht sichtbar sind."},
      {topic:"Nachrichtenstruktur",q:"Was ist die richtige Reihenfolge für eine Kundenservicenachricht?",opts:["Lösung, Begrüßung, Entschuldigung, Verabschiedung","Begrüßung, Eröffnung, Explizite Anerkennung, Antwort/Lösung, Abschließendes Supportangebot, Verabschiedung + Unterschrift","Begrüßung, Problemzusammenfassung, Optionen, Preis, Unterschrift","Eröffnung, Entschuldigung, Zeitplan, Haftungsausschluss, Abschluss"],correct:1,explanation:"Die empfohlene Formel lautet: Begrüßung, Eröffnung, Explizite Anerkennung, Antwort/Lösung, Abschließendes Supportangebot, Verabschiedung + Unterschrift."},
      {topic:"Absatzstruktur",q:"Ein Kunde erhält diese Antwort: 'Hallo Anna, vielen Dank für deine Nachricht. Wir haben deine Rücksendung erhalten und unser Team prüft sie. Deine Rückerstattung wird innerhalb von 3 bis 5 Werktagen bearbeitet und du erhältst eine Bestätigungs-E-Mail. Bitte melde dich bei Fragen. Schönen Tag noch! Viele Grüße, Sofia, TechSeller GmbH.' Was stimmt mit dieser Nachricht nicht?",opts:["Der Ton ist zu informell","Die Unterschrift fehlt den Firmennamen","Es gibt keine Leerzeilen zwischen den Absätzen","Nichts — diese Nachricht ist korrekt"],correct:2,explanation:"Jeder Absatz sollte durch eine Leerzeile getrennt sein, damit die Nachricht leicht zu lesen ist."},
      {topic:"Fachjargon vermeiden",q:"Ein Kunde fragt nach dem Status seines Falls. Welche Antwort verwendet die beste Sprache?",opts:["Ihr Ticket wurde an unsere technische Abteilung zur weiteren Beurteilung weitergeleitet.","Deine Anfrage wird derzeit von unserem Team geprüft und wir melden uns innerhalb von 24 Stunden bei dir.","Das oben genannte Problem wurde protokolliert und wird zu gegebener Zeit bearbeitet.","Wir haben das Lösungsverfahren für deinen Fall eingeleitet."],correct:1,explanation:"Vermeide interne Begriffe wie 'Ticket' — verwende stattdessen 'Anfrage'. Vermeide vage Ausdrücke wie 'zu gegebener Zeit' und gib stattdessen einen konkreten Zeitrahmen an. Option D ist ebenfalls falsch — 'Lösungsverfahren eingeleitet' ist unnötig komplexer Fachjargon, den Kunden wahrscheinlich nicht verstehen."},
      {topic:"Verabschiedung und Unterschrift",q:"Was ist die beste Art, eine Kundennachricht zu beenden?",opts:["Mit freundlichen Grüßen, Sofia","Grüße","Schönen Rest des Tages! Viele Grüße, Sofia, TechSeller GmbH","Danke für deine Geduld. Wir melden uns."],correct:2,explanation:"Beende immer mit einer warmen Verabschiedung und füge deine vollständige Unterschrift mit deinem Namen und dem Firmennamen ein."},
      {topic:"Zuverlässige Sprache",q:"Ein Kunde fragt, wann seine Rückerstattung ankommt. Was ist die beste Antwort?",opts:["Deine Rückerstattung sollte innerhalb weniger Tage ankommen.","Wir würden erwarten, dass die Rückerstattung irgendwann nächste Woche bearbeitet wird.","Deine Rückerstattung wird innerhalb von 3 bis 5 Werktagen bearbeitet und du erhältst eine Bestätigungs-E-Mail.","Rückerstattungen werden in der Regel nach der Inspektion ausgestellt, aber die Zeitrahmen können variieren."],correct:2,explanation:"Verwende verbindliche, zuverlässige Sprache und gib einen konkreten Zeitrahmen an. Vermeide 'sollte', 'würden erwarten' und 'können variieren'."},
      {topic:"Deeskalation",q:"Ein Kunde schreibt, dass er sehr frustriert ist und eine sofortige Rückerstattung verlangt. Was ist der beste Ansatz?",opts:["Die Rückerstattungsrichtlinie im Detail erklären und alle Bedingungen auflisten","Sich entschuldigen, die Frustration anerkennen und klar erklären, was getan werden kann und bis wann","Den Kunden bitten, sich zu beruhigen, bevor geholfen werden kann","Den Fall sofort an den refurbed Support weiterleiten"],correct:1,explanation:"Deeskaliere, indem du die Frustration mit Empathie anerkennst, und konzentriere dich dann auf das, was du TUN KANNST, mit einem klaren Zeitrahmen."},
      {topic:"Nächste Schritte erklären",q:"Nach der Vereinbarung einer Rücksendung — welcher Abschlussabsatz ist am besten?",opts:["Wir melden uns, sobald wir weitere Informationen haben.","Bitte warte auf weitere Updates.","Sobald wir den Artikel erhalten haben, werden wir ihn prüfen und uns innerhalb von 3 Werktagen mit einer Lösung bei dir melden. Melde dich gerne, wenn du in der Zwischenzeit Fragen hast.","Die Rücksendung ist nun in Bearbeitung. Es sind keine weiteren Maßnahmen deinerseits erforderlich."],correct:2,explanation:"Beschreibe die nächsten Schritte immer klar, gib einen realistischen Zeitrahmen an und biete weitere Unterstützung an."},
      {topic:"Rechtschreibung und Grammatik",q:"Warum ist es wichtig, eine Nachricht vor dem Senden auf Grammatik- und Rechtschreibfehler zu prüfen?",opts:["Das System von refurbed korrigiert Fehler automatisch, daher ist es nicht notwendig","Fehler lassen die Nachricht unprofessionell wirken und können das Vertrauen des Kunden in den Verkäufer beschädigen","Grammatikfehler sind nur bei formellen Nachrichten wichtig","Es ist nur wichtig, wenn der Kunde ein Muttersprachler ist"],correct:1,explanation:"Alle Nachrichten sollten frei von Grammatik- und Rechtschreibfehlern sein. Fehler untergraben die Professionalität und das Kundenvertrauen."}
    ]
  },
  it:{
    lang:"Italiano",next:"Prossima domanda",finish:"Vedi risultati",restart:"Rifai il quiz",

    review_title:"Le tue risposte",
    your_ans:"La tua risposta:",correct_ans:"Risposta corretta:",
    cta_pass:"Ottimo lavoro! Tieni a mente queste linee guida ogni volta che scrivi a un cliente.",
    cta_fail:"Ti consigliamo di rivedere le seguenti risorse prima di ripetere il quiz.",
    cta_link:"Apri le Linee Guida di Comunicazione",
    cta_link2:"Apri le Informazioni per i Venditori",
    questions:[
      {topic:"Apertura di un messaggio",q:"Un cliente scrive per dire che il suo laptop è arrivato con lo schermo rotto. Qual è la migliore frase di apertura?",opts:["Abbiamo ricevuto il tuo messaggio riguardo al laptop.","Grazie per averci contattato. Siamo spiacenti di sapere che il tuo laptop è arrivato con lo schermo rotto, possiamo immaginare quanto sia frustrante.","Ti preghiamo di inviare foto del danno in modo da poter valutare la situazione.","Il laptop dovrà essere restituito prima che possiamo elaborare una sostituzione."],correct:1,explanation:"L'apertura dovrebbe ringraziare il cliente e riconoscere il problema con empatia prima di qualsiasi altra cosa."},
      {topic:"Lingua",q:"Un cliente ti scrive in olandese. Cosa dovresti fare?",opts:["Rispondere in inglese, in quanto è la lingua commerciale standard","Rispondere nella lingua della sede aziendale","Rispondere in olandese, la lingua del cliente","Chiedere al cliente quale lingua preferisce"],correct:2,explanation:"Rispondi sempre nella stessa lingua usata dal cliente per contattarti."},
      {topic:"Come rivolgersi al cliente",q:"Un cliente di nome Marco Rossi ti contatta. Come dovresti rivolgerti a lui?",opts:["Gentile Sig. Rossi,","Gentile Cliente,","Ciao Marco,","Salve,"],correct:2,explanation:"Usa sempre il nome di battesimo del cliente e un tono informale, a meno che non richiedano esplicitamente il formale."},
      {topic:"Linguaggio positivo",q:"Un cliente chiede se il suo articolo può essere sostituito. Qual è la risposta migliore?",opts:["Non possiamo garantire una sostituzione fino a quando l'articolo non è stato ispezionato.","Le sostituzioni sono possibili solo in determinate condizioni.","Saremo felici di organizzare una sostituzione per te una volta esaminato l'articolo.","Potresti avere diritto a una sostituzione a seconda del risultato dell'ispezione."],correct:2,explanation:"Concentrati su ciò che PUOI fare, usando un linguaggio affidabile e impegnato. Evita 'non possiamo', 'solo in determinate condizioni' e 'potresti avere diritto'."},
      {topic:"Tono di voce",q:"Un cliente chiede di essere trattato formalmente. Cosa dovresti fare?",opts:["Usare il tono formale solo nel primo messaggio, poi tornare all'informale","Chiedere nuovamente al cliente nel prossimo messaggio per confermare la sua preferenza","Passare al tono formale e mantenerlo coerentemente per il resto della conversazione","Continuare con il tono informale poiché è lo standard di refurbed"],correct:2,explanation:"Una volta passato al tono formale su richiesta del cliente, deve essere mantenuto coerentemente."},
      {topic:"Domande di chiarimento",q:"Un cliente segnala che il suo telefono non funziona ma non fornisce ulteriori dettagli. Cosa dovresti fare?",opts:["Chiedere ulteriori dettagli in un messaggio di follow-up dopo aver inviato una risposta iniziale","Porre tutte le domande di chiarimento nel tuo primo messaggio per evitare lunghi scambi","Inviare una guida standard per la risoluzione dei problemi e attendere la risposta del cliente","Trasferire il caso al supporto refurbed immediatamente"],correct:1,explanation:"Poni tutte le domande di chiarimento nel tuo primo messaggio per evitare inutili scambi."},
      {topic:"Zendesk",q:"Il dispositivo di un cliente non funziona e hai bisogno di ulteriori informazioni. Cosa dovresti fare?",opts:["Chiedere al cliente di inviare foto e video alla tua email aziendale per velocizzare il processo","Chiedere al cliente di contattarti su WhatsApp per una risoluzione più rapida","Chiedere tutte le informazioni necessarie direttamente in Zendesk, nel tuo primo messaggio","Chiamare il cliente per ottenere i dettagli per telefono"],correct:2,explanation:"Mantieni sempre tutta la comunicazione in Zendesk. Non chiedere mai ai clienti di contattarti fuori dal sistema — tramite email aziendale, WhatsApp o qualsiasi altro canale. refurbed non sarà in grado di supportare né il venditore né il cliente se le informazioni non sono visibili."},
      {topic:"Struttura del messaggio",q:"Qual è l'ordine corretto per un messaggio di assistenza clienti?",opts:["Soluzione, Saluto, Scuse, Congedo","Saluto, Apertura, Riconoscimento esplicito, Risposta/Soluzione, Offerta finale di supporto, Congedo + Firma","Saluto, Riepilogo problema, Opzioni, Prezzo, Firma","Apertura, Scuse, Tempistiche, Disclaimer, Chiusura"],correct:1,explanation:"La formula consigliata è: Saluto, Apertura, Riconoscimento esplicito, Risposta/Soluzione, Offerta finale di supporto, Congedo + Firma."},
      {topic:"Struttura dei paragrafi",q:"Un cliente riceve questa risposta: 'Ciao Anna, grazie per il tuo messaggio. Abbiamo ricevuto il tuo reso e il nostro team lo sta ispezionando. Il tuo rimborso verrà elaborato entro 3-5 giorni lavorativi e riceverai un email di conferma. Contattaci se hai domande. Buona giornata! Cordiali saluti, Sofia, TechSeller GmbH.' Cosa c'è di sbagliato in questo messaggio?",opts:["Il tono è troppo informale","La firma è priva del nome dell'azienda","Non ci sono righe vuote tra i paragrafi","Niente — questo messaggio è corretto"],correct:2,explanation:"Ogni paragrafo dovrebbe essere separato da una riga vuota in modo che il messaggio sia facile da seguire."},
      {topic:"Evitare il gergo",q:"Un cliente chiede informazioni sullo stato del suo caso. Quale risposta usa il linguaggio migliore?",opts:["Il suo ticket è stato inoltrato al nostro reparto tecnico per ulteriori valutazioni.","La tua richiesta è attualmente in fase di revisione da parte del nostro team e ti risponderemo entro 24 ore.","Il suddetto problema è stato registrato e verrà elaborato a tempo debito.","Abbiamo avviato la procedura di risoluzione per il tuo caso."],correct:1,explanation:"Evita termini tecnici interni come 'ticket' quando scrivi ai clienti — usa 'richiesta' al suo posto. Evita espressioni vaghe come 'a tempo debito' e fornisci invece una tempistica concreta. Anche l'opzione D è errata — 'avviato la procedura di risoluzione' è un gergo inutilmente complesso che i clienti difficilmente capirebbero."},
      {topic:"Congedo e firma",q:"Qual è il modo migliore per concludere un messaggio al cliente?",opts:["Distinti saluti, Sofia","Saluti","Buon proseguimento di giornata! Cordiali saluti, Sofia, TechSeller GmbH","Grazie per la tua pazienza. Ci faremo vivi."],correct:2,explanation:"Concludi sempre con una frase di congedo calorosa e includi la tua firma completa con il tuo nome e il nome dell'azienda."},
      {topic:"Linguaggio affidabile",q:"Un cliente chiede quando arriverà il suo rimborso. Qual è la risposta migliore?",opts:["Il tuo rimborso dovrebbe arrivare entro qualche giorno.","Ci aspettiamo che il rimborso venga elaborato la prossima settimana.","Il tuo rimborso verrà elaborato entro 3-5 giorni lavorativi e riceverai un'email di conferma.","I rimborsi vengono solitamente emessi dopo l'ispezione ma i tempi possono variare."],correct:2,explanation:"Usa un linguaggio affidabile e impegnato e fornisci una tempistica specifica. Evita 'dovrebbe', 'ci aspettiamo' e 'possono variare'."},
      {topic:"De-escalation",q:"Un cliente scrive dicendo di essere molto frustrato e chiede un rimborso immediato. Qual è l'approccio migliore?",opts:["Spiegare in dettaglio la politica di rimborso ed elencare tutte le condizioni","Scusarsi, riconoscere la frustrazione e spiegare chiaramente cosa si può fare e entro quando","Chiedere al cliente di calmarsi prima di poterlo assistere","Trasferire il caso al supporto refurbed immediatamente"],correct:1,explanation:"De-escalate riconoscendo la frustrazione con empatia, poi concentrati su ciò che PUOI fare e fornisci una tempistica chiara."},
      {topic:"Spiegare i prossimi passi",q:"Dopo aver organizzato un reso, qual è il paragrafo di chiusura migliore?",opts:["Ci faremo vivi non appena avremo ulteriori informazioni.","Ti preghiamo di attendere ulteriori aggiornamenti.","Una volta ricevuto l'articolo, lo ispezioneremo e ti risponderemo entro 3 giorni lavorativi con una soluzione. Non esitare a contattarci se hai domande nel frattempo.","Il reso è ora in corso. Non sono necessarie ulteriori azioni da parte tua."],correct:2,explanation:"Descrivi sempre i prossimi passi chiaramente, fornisci una tempistica realistica e offri ulteriore supporto."},
      {topic:"Ortografia e grammatica",q:"Perché è importante controllare i propri messaggi per errori grammaticali e ortografici prima di inviarli?",opts:["Il sistema di refurbed corregge automaticamente gli errori quindi non è necessario","Gli errori rendono il messaggio poco professionale e possono danneggiare la fiducia del cliente nel venditore","Gli errori grammaticali sono importanti solo nei messaggi formali","È importante solo se il cliente è di madrelingua"],correct:1,explanation:"Tutti i messaggi dovrebbero essere privi di errori grammaticali e ortografici. Gli errori minano la professionalità e la fiducia del cliente."}
    ]
  }
};

let currentLang='en',currentQ=0,answered=false,userAnswers=[],quizDone=false;
function getQuiz(){return QUIZZES[currentLang];}
let exCurrent=0,exDone=false,exFound={};

function switchMainTab(tab){
  document.querySelectorAll('.main-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.querySelector('.main-tab[onclick="switchMainTab(\''+tab+'\')"]').classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='examples') renderEx();
}

function renderLangBar(){
  return '<div class="lang-bar">'+Object.keys(QUIZZES).map(k=>
    '<button class="lang-btn'+(k===currentLang?' active':'')+'" onclick="switchLang(\''+k+'\')">'+QUIZZES[k].lang+'</button>'
  ).join('')+'</div>';
}

function renderQuiz(){
  const quiz=getQuiz();
  if(quizDone){renderResults();return;}
  const q=quiz.questions[currentQ],total=quiz.questions.length;
  const pct=((currentQ)/total*100).toFixed(0),isLast=currentQ===total-1;
  const labels=['A','B','C','D'];
  let html=renderLangBar();
  html+='<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:'+pct+'%"></div></div>';
  html+='<div class="q-counter">'+(currentQ+1)+' / '+total+'</div>';
  html+='<div class="tag">'+q.topic+'</div>';
  html+='<div class="q-text">'+q.q+'</div>';
  html+='<div class="options-grid">';
  q.opts.forEach((opt,i)=>{
    let cls='';
    if(answered){if(i===q.correct)cls='correct';else if(userAnswers[currentQ]===i)cls='wrong';}
    html+='<button class="opt-btn '+cls+'" onclick="selectAnswer('+i+')" '+(answered?'disabled':'')+'>'
      +'<span class="opt-label">'+labels[i]+'</span>'
      +'<span class="opt-text">'+opt+'</span>'
      +'</button>';
  });
  html+='</div>';
  if(answered){
    const ok=userAnswers[currentQ]===q.correct;
    html+='<div class="feedback-box show '+(ok?'ok':'no')+'"><strong>'+(ok?quiz.correct_msg:quiz.wrong_msg)+'</strong> '+q.explanation+'</div>';
  }
  html+='<div class="nav-row"><button class="next-btn'+(answered?' show':'')+'" onclick="nextQuestion()">'+(isLast?quiz.finish:quiz.next)+' &#8594;</button></div>';
  document.getElementById('app').innerHTML=html;
}

function renderResults(){
  const quiz=getQuiz(),total=quiz.questions.length;
  const score=userAnswers.filter((a,i)=>a===quiz.questions[i].correct).length;
  const pct=Math.round(score/total*100),pass=pct>=70;
  const labels=['A','B','C','D'];
  let html=renderLangBar();
  html+='<div class="score-card"><div class="score-big">'+score+' / '+total+'</div><div class="score-label">'+pct+'% — '+score+' '+quiz.score_label+'</div><div style="margin-top:10px"><span class="tag '+(pass?'tag-pass':'tag-fail')+'">'+(pass?'✓ Pass':'✗ Needs review')+'</span></div></div>';
  html+='<div class="cta-box '+(pass?'pass':'fail')+'">';
  html+=quiz[pass?'cta_pass':'cta_fail'];
  if(!pass){
    html+='<a href="'+GUIDELINES_URL+'" target="_blank">'+quiz.cta_link+' &#8594;</a>';
    html+='<a href="'+SELLER_INFO_URL+'" target="_blank">'+quiz.cta_link2+' &#8594;</a>';
  }
  html+='</div>';
  html+='<div class="review-title">'+quiz.review_title+'</div>';
  quiz.questions.forEach((q,i)=>{
    const ok=userAnswers[i]===q.correct;
    html+='<div class="review-item">';
    html+='<div class="review-item-header" onclick="toggleReview(this)">';
    html+='<span style="font-size:13px;">'+(i+1)+'. '+q.q+'</span>';
    html+='<span class="review-item-status '+(ok?'ok':'no')+'">'+(ok?'✓':'✗')+'</span>';
    html+='</div>';
    html+='<div class="review-item-body">';
    if(!ok)html+='<div class="review-row review-wrong">✗ '+quiz.your_ans+' '+labels[userAnswers[i]]+'. '+q.opts[userAnswers[i]]+'</div>';
    html+='<div class="review-row review-correct">✓ '+quiz.correct_ans+' '+labels[q.correct]+'. '+q.opts[q.correct]+'</div>';
    if(!ok)html+='<div class="review-explanation">'+q.explanation+'</div>';
    html+='</div></div>';
  });
  html+='<button class="restart-btn" onclick="restartQuiz()">'+quiz.restart+'</button>';
  document.getElementById('app').innerHTML=html;
}

function toggleReview(header){
  const body=header.nextElementSibling;
  body.classList.toggle('open');
}

function selectAnswer(i){if(answered)return;answered=true;userAnswers[currentQ]=i;renderQuiz();}
function nextQuestion(){const t=getQuiz().questions.length;if(currentQ<t-1){currentQ++;answered=false;renderQuiz();}else{quizDone=true;renderResults();}}
function switchLang(l){
  currentLang=l;
  currentQ=0;answered=false;userAnswers=[];quizDone=false;
  exCurrent=0;exDone=false;exFound={};
  const activeTab=document.querySelector('.main-tab.active').getAttribute('onclick').includes('quiz')?'quiz':'examples';
  if(activeTab==='quiz') renderQuiz(); else renderEx();
}
function restartQuiz(){currentQ=0;answered=false;userAnswers=[];quizDone=false;renderQuiz();}

function getExData(){return EXAMPLES[currentLang];}
function countClickable(parts){return parts.filter(p=>p.clickable).length;}
function countFound(idx){return Object.keys(exFound[idx]||{}).length;}

function renderEx(){
  const data=getExData();
  if(exDone){renderExDone();return;}
  const scenario=data.scenarios[exCurrent];
  const total=data.scenarios.length;
  const pct=Math.round((exCurrent/total)*100);
  const totalClickable=countClickable(scenario.parts);
  const foundCount=countFound(exCurrent);
  const allFound=foundCount>=totalClickable;
  const isLast=exCurrent===total-1;
  let html='<div class="ex-wrap">';
  html+=renderLangBar();
  html+='<div class="ex-progress-bg"><div class="ex-progress-fill" style="width:'+pct+'%"></div></div>';
  html+='<div class="ex-counter">'+(exCurrent+1)+' / '+total+'</div>';
  html+='<div class="ex-title">'+scenario.title+'</div>';
  html+='<div class="ex-instruction">'+data.instruction+'</div>';
  html+='<div class="email-shell">';
  scenario.parts.forEach((part,idx)=>{
    if(part.text==='\n'){html+='<span class="email-spacer"></span>';return;}
    const isFound=(exFound[exCurrent]||{})[idx];
    const cls='email-part'+(isFound?' found':'');
    html+='<span class="'+cls+'" onclick="exClickPart('+exCurrent+','+idx+')">'+escHtml(part.text)+'</span>';
  });
  html+='</div>';
  html+='<div class="ex-bottom-row">';
  html+='<button class="reveal-btn" onclick="revealAll()">'+data.reveal+'</button>';
  html+='<button class="ex-next-btn'+(allFound?' unlocked':'')+'" onclick="'+(allFound?'exNext()':'')+'">'+( isLast?data.finish:data.next)+' &#8594;</button>';
  html+='</div></div>';
  document.getElementById('ex-app').innerHTML=html;
}

function escHtml(str){return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function exClickPart(scenarioIdx,partIdx){
  const data=getExData();
  const part=data.scenarios[scenarioIdx].parts[partIdx];
  if(part.text==='\n') return;
  const improvedEl=document.getElementById('popup-improved-text');
  const correctEl=document.getElementById('popup-correct-text');
  const whyLabelEl=document.getElementById('popup-why-label');
  const whyTextEl=document.getElementById('popup-why-text');
  const improvedLabelEl=document.getElementById('popup-improved-label');
  if(part.clickable){
    if(!exFound[scenarioIdx]) exFound[scenarioIdx]={};
    exFound[scenarioIdx][partIdx]=true;
    improvedLabelEl.textContent=data.improved+':';
    if(part.improved){improvedEl.style.display='block';improvedEl.textContent=part.improved;}
    else{improvedEl.style.display='none';}
    correctEl.style.display='none';
    whyLabelEl.textContent=data.why+':';
    whyTextEl.textContent=part.why;
  } else {
    improvedLabelEl.textContent='';
    improvedEl.style.display='none';
    correctEl.style.display='block';
    correctEl.textContent=data.correct_sentence;
    whyLabelEl.textContent='';
    whyTextEl.textContent='';
  }
  document.getElementById('popup-close').textContent=data.close;
  document.getElementById('popup').classList.add('show');
  renderEx();
}

function closePopup(e){
  if(!e||e.target===document.getElementById('popup')){
    document.getElementById('popup').classList.remove('show');
  }
}

function revealAll(){
  const data=getExData();
  const scenario=data.scenarios[exCurrent];
  if(!exFound[exCurrent]) exFound[exCurrent]={};
  scenario.parts.forEach((part,idx)=>{if(part.clickable) exFound[exCurrent][idx]=true;});
  renderEx();
}

function exNext(){
  const total=getExData().scenarios.length;
  if(exCurrent<total-1){exCurrent++;renderEx();}
  else{exDone=true;renderExDone();}
}

function renderExDone(){
  const data=getExData();
  let html=renderLangBar();
  html+='<div class="done-screen">';
  html+='<div style="font-size:48px;margin-bottom:1rem;">✓</div>';
  html+='<h2>'+data.done_title+'</h2>';
  html+='<p>'+data.done_text+'</p>';
  html+='<button class="restart-btn" onclick="exRestart()">'+data.restart+'</button>';
  html+='</div>';
  document.getElementById('ex-app').innerHTML=html;
}

function exRestart(){exCurrent=0;exDone=false;exFound={};renderEx();}
renderQuiz();
</script>
