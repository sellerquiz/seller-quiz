<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Communication Guidelines</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@400;500;700&display=swap">
<style>

    font-family: 'Youth Black';

    font-style: normal;

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Readex Pro', sans-serif; background: #f9f9f8; color: #1a1a1a; min-height: 100vh; display: flex; justify-content: center; padding: 2rem 1rem; }
  .container { width: 100%; max-width: 680px; }
  h1 { font-size: 20px; font-family: 'Youth Black', sans-serif; font-weight: 900; margin-bottom: 0.25rem; }
  .subtitle { font-size: 13px; color: #666; margin-bottom: 1.5rem; }
  .main-tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 0.5px solid #e5e5e5; }
  .main-tab { padding: 8px 20px; border: 0.5px solid transparent; border-bottom: none; background: transparent; color: #666; cursor: pointer; font-size: 14px; font-family: 'Readex Pro', sans-serif; border-radius: 8px 8px 0 0; }
  .main-tab.active { background: #fff; color: #332E80; border-color: #e5e5e5; font-weight: 500; margin-bottom: -0.5px; }
  .main-tab:hover:not(.active) { color: #332E80; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .lang-bar { display: flex; gap: 8px; margin-bottom: 1.5rem; }
  .lang-btn { padding: 6px 16px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; color: #666; cursor: pointer; font-size: 13px; font-family: 'Readex Pro', sans-serif; }
  .lang-btn.active { background: #eeecf9; color: #332E80; border-color: #332E80; font-weight: 500; }
  .progress-bar-bg { height: 4px; background: #e5e5e5; border-radius: 2px; margin-bottom: 1.5rem; }
  .progress-bar-fill { height: 4px; background: #332E80; border-radius: 2px; transition: width 0.3s; }
  .q-counter { font-size: 12px; color: #999; margin-bottom: 0.5rem; }
  .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 8px; margin-bottom: 8px; background: #eeecf9; color: #332E80; }
  .q-text { font-size: 16px; font-family: 'Readex Pro', sans-serif; font-weight: 400; margin-bottom: 1.25rem; line-height: 1.5; }
  .options-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.5rem; }
  .opt-btn { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; color: #1a1a1a; cursor: pointer; font-size: 14px; text-align: left; transition: background 0.15s, border-color 0.15s; width: 100%; font-family: 'Readex Pro', sans-serif; }
  .opt-btn:hover:not(:disabled) { background: #f5f5f3; border-color: #999; }
  .opt-btn:disabled { cursor: default; }
  .opt-label { width: 26px; height: 26px; border-radius: 50%; border: 0.5px solid #ccc; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; color: #666; }
  .opt-btn.correct { background: #eaf3de; border-color: #7ab84a; }
  .opt-btn.correct .opt-label { background: #eaf3de; border-color: #7ab84a; color: #3b6d11; }
  .opt-btn.correct .opt-text { color: #3b6d11; }
  .opt-btn.wrong { background: #fcebeb; border-color: #e24b4a; }
  .opt-btn.wrong .opt-label { background: #fcebeb; border-color: #e24b4a; color: #a32d2d; }
  .opt-btn.wrong .opt-text { color: #a32d2d; }
  .feedback-box { padding: 10px 14px; border-radius: 8px; font-size: 13px; line-height: 1.5; margin-bottom: 1rem; display: none; }
  .feedback-box.show { display: block; }
  .feedback-box.ok { background: #eeecf9; color: #332E80; border: 0.5px solid #332E80; }
  .feedback-box.no { background: #fcebeb; color: #a32d2d; border: 0.5px solid #e24b4a; }
  .nav-row { display: flex; justify-content: flex-end; }
  .next-btn { padding: 8px 20px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; color: #1a1a1a; cursor: pointer; font-size: 14px; display: none; font-family: 'Readex Pro', sans-serif; }
  .next-btn.show { display: block; }
  .next-btn:hover { background: #f5f5f3; }
  .score-card { background: #f5f5f3; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; text-align: center; }
  .score-big { font-size: 40px; font-weight: 500; }
  .score-label { font-size: 13px; color: #666; margin-top: 4px; }
  .tag-pass { background: #eaf3de; color: #3b6d11; }
  .tag-fail { background: #fcebeb; color: #a32d2d; }
  .review-title { font-size: 14px; font-weight: 500; margin-bottom: 10px; }
  .review-item { border: 0.5px solid #e5e5e5; border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; background: #fff; }
  .review-q { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
  .review-row { font-size: 12px; margin-bottom: 3px; }
  .review-correct { color: #3b6d11; }
  .review-wrong { color: #a32d2d; }
  .review-explanation { font-size: 12px; color: #666; margin-top: 6px; padding-top: 6px; border-top: 0.5px solid #e5e5e5; line-height: 1.5; }
  .restart-btn { padding: 8px 20px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; color: #1a1a1a; cursor: pointer; font-size: 14px; margin-top: 1rem; font-family: 'Readex Pro', sans-serif; }
  .restart-btn:hover { background: #f5f5f3; }

  .ex-wrap { padding: 0.5rem 0; }
  .ex-progress-bg { height: 4px; background: #e5e5e5; border-radius: 2px; margin-bottom: 1.5rem; }
  .ex-progress-fill { height: 4px; background: #332E80; border-radius: 2px; transition: width 0.3s; }
  .ex-counter { font-size: 12px; color: #999; margin-bottom: 0.5rem; }
  .ex-title { font-size: 15px; font-weight: 500; color: #1a1a1a; margin-bottom: 0.5rem; }
  .ex-instruction { font-size: 13px; color: #666; margin-bottom: 1.25rem; line-height: 1.5; }
  .email-shell { background: #fff; border: 0.5px solid #e5e5e5; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.25rem; font-size: 14px; line-height: 1.8; }
  .email-part { display: block; padding: 3px 6px; border-radius: 4px; background: #f5f5f3; margin: 2px 0; cursor: pointer; transition: background 0.15s; position: relative; white-space: pre-line; }
  .email-part:hover { background: #eceae6; }
  .email-part.found { background: #eaf3de; color: #1a1a1a; }
  .email-part.non-clickable { cursor: default; }
  .email-part.non-clickable:hover { background: #f5f5f3; }
  .email-spacer { display: block; height: 10px; }
  .popup-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
  .popup-overlay.show { display: flex; }
  .popup-box { background: #fff; border-radius: 12px; padding: 1.5rem; max-width: 480px; width: 100%; border: 0.5px solid #e5e5e5; }
  .popup-improved-label { font-size: 11px; font-weight: 500; color: #3b6d11; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .popup-improved-text { font-size: 13px; color: #3b6d11; background: #eaf3de; border-radius: 8px; padding: 10px 12px; margin-bottom: 1rem; line-height: 1.7; white-space: pre-line; }
  .popup-why-label { font-size: 11px; font-weight: 500; color: #332E80; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .popup-why-text { font-size: 13px; color: #1a1a1a; line-height: 1.6; margin-bottom: 1rem; }
  .popup-close { padding: 7px 18px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; color: #1a1a1a; cursor: pointer; font-size: 13px; font-family: 'Readex Pro', sans-serif; }
  .popup-close:hover { background: #f5f5f3; }
  .ex-bottom-row { display: flex; justify-content: space-between; align-items: center; margin-top: 0.5rem; }
  .reveal-btn { padding: 7px 16px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; color: #666; cursor: pointer; font-size: 13px; font-family: 'Readex Pro', sans-serif; }
  .reveal-btn:hover { background: #f5f5f3; }
  .ex-next-btn { padding: 8px 20px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; color: #aaa; font-size: 14px; font-family: 'Readex Pro', sans-serif; cursor: not-allowed; }
  .ex-next-btn.unlocked { color: #1a1a1a; cursor: pointer; }
  .ex-next-btn.unlocked:hover { background: #f5f5f3; }
  .done-screen { text-align: center; padding: 3rem 1rem; }
  .done-screen h2 { font-family: 'Youth Black', sans-serif; font-size: 24px; font-weight: 900; color: #332E80; margin-bottom: 1rem; }
  .done-screen p { font-size: 15px; color: #666; margin-bottom: 2rem; line-height: 1.6; }
</style>
</head>
<body>
<div class="container">
  <h1>Communication Guidelines</h1>
  <p class="subtitle">refurbed seller training</p>
  <div class="main-tabs">
    <button class="main-tab active" onclick="switchMainTab('quiz')">Quiz</button>
    <button class="main-tab" onclick="switchMainTab('examples')">Email examples</button>
  </div>
  <div id="tab-quiz" class="tab-content active"><div id="app"></div></div>
  <div id="tab-examples" class="tab-content"><div id="ex-app"></div></div>
</div>

<div class="popup-overlay" id="popup" onclick="closePopup(event)">
  <div class="popup-box" onclick="event.stopPropagation()">

    <div class="popup-improved-text" id="popup-improved-text" style="display:none"></div>
    <div class="popup-why-label" id="popup-why-label"></div>
    <div class="popup-why-text" id="popup-why-text"></div>

  </div>
</div>

          {text:"We cannot process the return until we receive the item back.", clickable:true, improved:"We would be happy to arrange a return and inspection for you. Once you confirm you would like to proceed, we will send you a prepaid return label within 24 hours. As soon as we receive the item back, we will examine it and reach out to you with a solution.", why:"Focus on what you CAN do, not what you cannot. Negative framing frustrates customers and does not help them understand next steps."},
          {text:"\n"},
          {text:"If you have any questions, you can contact us.", clickable:true, improved:"Please do not hesitate to reach out if you have any questions, we are happy to help. Have a great rest of your day!", why:"End messages on a positive note with a warm farewell and an explicit offer of further support. 'You can contact us' is passive and cold."},
          {text:"\n"},
          {text:"Kind regards,\nSofia\nTechSeller GmbH", clickable:false}

      {
        title: "Scenario 2: Delivery status",
        parts: [
          {text:"Dear Mr. Smith,", clickable:true, improved:"Hello James,", why:"Always address customers by their first name and use an informal tone, unless they have explicitly requested otherwise. 'Dear Mr. Smith' is too formal for the refurbed tone of voice."},
          {text:"\n"},
          {text:"Thank you for your message.", clickable:false},
          {text:"\n"},
          {text:"We have looked into your order and can confirm that it is currently in transit.", clickable:false},
          {text:"The estimated delivery date is within the next few days.", clickable:true, improved:"According to the tracking information, your order should arrive by Thursday 26 June.", why:"Be specific and give a concrete timeline. Vague expressions like 'within the next few days' do not manage the customer's expectations well."},
          {text:"Please refer to the tracking link in your order confirmation for further updates.", clickable:true, improved:"You can follow the latest updates using your tracking link here: [tracking link]. Please do not hesitate to reach out if it has not arrived by then and we will look into it further for you.", why:"Make it easy for the customer — include the tracking link directly in the message and proactively offer further help."},

          {text:"Should you require further assistance, please do not hesitate to contact us.", clickable:false},
          {text:"\n"},
          {text:"Yours sincerely,\nSofia", clickable:true, improved:"Have a great day!\n\nKind regards,\nSofia\nTechSeller GmbH", why:"Always end with a warm, friendly farewell phrase before your signature. 'Yours sincerely' is overly formal and the company name is missing from the signature."}
        ]

      {
        title: "Scenario 3: Refund after return",
        parts: [
          {text:"Hello Michael,", clickable:false},
          {text:"\n"},
          {text:"Thank you for returning your item and for your patience.", clickable:false},
          {text:"\n"},
          {text:"We are happy to let you know that we have received your return. Our team will now analyse the ticket and process your refund once the inspection is complete.", clickable:true, improved:"We are happy to let you know that we have received your return and our team is currently inspecting it.", why:"Avoid internal technical terms like 'ticket' — use 'request' instead. Separate the confirmation and the next steps into their own paragraphs for clarity."},
          {text:"\n"},
          {text:"Please let us know if you have any questions.", clickable:true, improved:"Once the inspection is complete, your refund will be processed within 3 to 5 business days. You will receive a confirmation email as soon as it has been issued.\n\nPlease let us know if you have any questions in the meantime, we are happy to help. Have a great rest of your week!", why:"Always give a realistic timeline and tell the customer what to expect next. End with a warm farewell and an offer of further support."},
          {text:"\n"},
          {text:"Kind regards,\nSofia\nTechSeller GmbH", clickable:false}
        ]
      },
      {
        title: "Scenario 4: Wrong item received",
        parts: [
          {text:"Hello David,", clickable:false},
          {text:"\n"},
          {text:"We have received your request.", clickable:true, improved:"Thank you for getting in touch with us, and we sincerely apologize for sending you the wrong item, we can imagine how disappointing that must be.", why:"Always open with a thank you and an explicit apology. Never skip straight to the matter at hand without acknowledging the customer's experience first."},
          {text:"\n"},
          {text:"To resolve this as quickly as possible, please send photos of the item directly to our email address at returns@techseller.com so our returns team can handle this for you.", clickable:true, improved:"To help us resolve this as quickly as possible, could you send us a photo of the item you received? This will help us confirm the details and arrange the correct replacement for you right away.", why:"Never ask customers to contact you outside the ticketing system. refurbed will not be able to support either party if the information is not visible to them. Always keep all communication within the ticketing system."},

          {text:"Once we receive your photos, we will get back to you within 24 hours with the next steps.", clickable:false},
          {text:"\n"},
          {text:"Kind regards,\nSofia", clickable:true, improved:"Thank you for your patience. Have a great day!\n\nKind regards,\nSofia\nTechSeller GmbH", why:"Always include a warm closing before your signature and make sure the company name is included. End on a positive note rather than closing abruptly."}

          {text:"Hello Sarah, thank you for your message regarding your device. As per our warranty terms, the device is covered under a 12-month limited warranty for manufacturing defects. To initiate the warranty claim procedure, we require documentation of the defect including photographic evidence. Once the aforementioned documentation has been submitted, our technical department will assess the eligibility of your claim in accordance with the applicable warranty policy. Please let us know if you have any questions.", clickable:true, improved:null, why:"This message should be divided into clear paragraphs with one empty line between each. Each paragraph should focus on one point — greeting, empathy, solution, next steps, farewell. Also avoid technical jargon like 'aforementioned' and 'initiate the warranty claim procedure' — write simply and clearly."},

let currentLang='en', currentQ=0, answered=false, userAnswers=[], quizDone=false;
function getQuiz(){return QUIZZES[currentLang];}

let exCurrent=0, exDone=false, exFound={};

function switchMainTab(tab){
  document.querySelectorAll('.main-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.querySelector('.main-tab[onclick="switchMainTab(\''+tab+'\')"]').classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='examples') renderEx();
}

function renderLangBar(){
  return '<div class="lang-bar">'+Object.keys(QUIZZES).map(k=>
    '<button class="lang-btn'+(k===currentLang?' active':'')+'" onclick="switchLang(\''+k+'\')">'+QUIZZES[k].lang+'</button>'
  ).join('')+'</div>';
}

function renderQuiz(){
  const quiz=getQuiz();
  if(quizDone){renderResults();return;}
  const q=quiz.questions[currentQ],total=quiz.questions.length;
  const pct=((currentQ)/total*100).toFixed(0),isLast=currentQ===total-1;
  const labels=['A','B','C','D'];
  let html=renderLangBar();
  html+='<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:'+pct+'%"></div></div>';
  html+='<div class="q-counter">'+(currentQ+1)+' / '+total+'</div>';
  html+='<div class="tag">'+q.topic+'</div>';
  html+='<div class="q-text">'+q.q+'</div>';
  html+='<div class="options-grid">';
  q.opts.forEach((opt,i)=>{
    let cls='';
    if(answered){if(i===q.correct)cls='correct';else if(userAnswers[currentQ]===i)cls='wrong';}
    html+='<button class="opt-btn '+cls+'" onclick="selectAnswer('+i+')" '+(answered?'disabled':'')+'>'
      +'<span class="opt-label">'+labels[i]+'</span>'
      +'<span class="opt-text">'+opt+'</span>'
      +'</button>';
  });
  html+='</div>';
  if(answered){
    const ok=userAnswers[currentQ]===q.correct;
    html+='<div class="feedback-box show '+(ok?'ok':'no')+'"><strong>'+(ok?quiz.correct_msg:quiz.wrong_msg)+'</strong> '+q.explanation+'</div>';
  }
  html+='<div class="nav-row"><button class="next-btn'+(answered?' show':'')+'" onclick="nextQuestion()">'+(isLast?quiz.finish:quiz.next)+' &#8594;</button></div>';
  document.getElementById('app').innerHTML=html;
}

function renderResults(){
  const quiz=getQuiz(),total=quiz.questions.length;
  const score=userAnswers.filter((a,i)=>a===quiz.questions[i].correct).length;
  const pct=Math.round(score/total*100),pass=pct>=70;
  const labels=['A','B','C','D'];
  let html=renderLangBar();
  html+='<div class="score-card"><div class="score-big">'+score+' / '+total+'</div><div class="score-label">'+pct+'% — '+score+' '+quiz.score_label+'</div><div style="margin-top:10px"><span class="tag '+(pass?'tag-pass':'tag-fail')+'">'+(pass?'✓ Pass':'✗ Needs review')+'</span></div></div>';
  html+='<div class="review-title">'+quiz.review_title+'</div>';
  quiz.questions.forEach((q,i)=>{
    const ok=userAnswers[i]===q.correct;
    html+='<div class="review-item"><div class="review-q">'+(i+1)+'. '+q.q+'</div>';
    if(!ok)html+='<div class="review-row review-wrong">✗ '+quiz.your_ans+' '+labels[userAnswers[i]]+'. '+q.opts[userAnswers[i]]+'</div>';
    html+='<div class="review-row review-correct">✓ '+quiz.correct_ans+' '+labels[q.correct]+'. '+q.opts[q.correct]+'</div>';
    if(!ok)html+='<div class="review-explanation">'+q.explanation+'</div>';
    html+='</div>';
  });
  html+='<button class="restart-btn" onclick="restartQuiz()">'+quiz.restart+'</button>';
  document.getElementById('app').innerHTML=html;
}

function selectAnswer(i){if(answered)return;answered=true;userAnswers[currentQ]=i;renderQuiz();}
function nextQuestion(){const t=getQuiz().questions.length;if(currentQ<t-1){currentQ++;answered=false;renderQuiz();}else{quizDone=true;renderResults();}}
function switchLang(l){
  currentLang=l;
  currentQ=0;answered=false;userAnswers=[];quizDone=false;
  exCurrent=0;exDone=false;exFound={};
  const activeTab=document.querySelector('.main-tab.active').getAttribute('onclick').includes('quiz')?'quiz':'examples';
  if(activeTab==='quiz') renderQuiz();
  else renderEx();
}
function restartQuiz(){currentQ=0;answered=false;userAnswers=[];quizDone=false;renderQuiz();}

function getExData(){return EXAMPLES[currentLang];}

function countClickable(parts){return parts.filter(p=>p.clickable).length;}
function countFound(scenarioIdx){return Object.keys(exFound[scenarioIdx]||{}).length;}

function renderEx(){
  const data=getExData();
  if(exDone){renderExDone();return;}
  const scenario=data.scenarios[exCurrent];
  const total=data.scenarios.length;
  const pct=Math.round((exCurrent/total)*100);
  const totalClickable=countClickable(scenario.parts);
  const foundCount=countFound(exCurrent);
  const allFound=foundCount>=totalClickable;
  const isLast=exCurrent===total-1;

  let html='<div class="ex-wrap">';
  html+=renderLangBar();
  html+='<div class="ex-progress-bg"><div class="ex-progress-fill" style="width:'+pct+'%"></div></div>';
  html+='<div class="ex-counter">'+(exCurrent+1)+' / '+total+'</div>';
  html+='<div class="ex-title">'+scenario.title+'</div>';
  html+='<div class="ex-instruction">'+data.instruction+'</div>';
  html+='<div class="email-shell">';
  scenario.parts.forEach((part,idx)=>{
    if(part.text==='\n'){html+='<span class="email-spacer"></span>';return;}
    const isFound=(exFound[exCurrent]||{})[idx];
    if(part.clickable){
      html+='<span class="email-part'+(isFound?' found':'')+'" onclick="exClickPart('+exCurrent+','+idx+')">'+escHtml(part.text)+'</span>';
    } else {
      html+='<span class="email-part non-clickable">'+escHtml(part.text)+'</span>';
    }
  });
  html+='</div>';
  html+='<div class="ex-bottom-row">';
  html+='<button class="reveal-btn" onclick="revealAll()">'+data.reveal+'</button>';
  html+='<button class="ex-next-btn'+(allFound?' unlocked':'')+'" onclick="'+(allFound?'exNext()':'')+'">'+( isLast?data.finish:data.next)+' &#8594;</button>';
  html+='</div>';
  html+='</div>';
  document.getElementById('ex-app').innerHTML=html;
}

function escHtml(str){
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function exClickPart(scenarioIdx, partIdx){
  const data=getExData();
  const part=data.scenarios[scenarioIdx].parts[partIdx];
  if(!part.clickable) return;
  if(!exFound[scenarioIdx]) exFound[scenarioIdx]={};
  exFound[scenarioIdx][partIdx]=true;

  const improvedLabel=data.improved;
  const whyLabel=data.why;
  document.getElementById('popup-improved-label').textContent=improvedLabel+':';
  const improvedEl=document.getElementById('popup-improved-text');
  if(part.improved){
    improvedEl.style.display='block';
    improvedEl.textContent=part.improved;
  } else {
    improvedEl.style.display='none';
  }
  document.getElementById('popup-why-label').textContent=whyLabel+':';
  document.getElementById('popup-why-text').textContent=part.why;
  document.getElementById('popup-close').textContent=data.close;
  document.getElementById('popup').classList.add('show');
  renderEx();
}

function closePopup(e){
  if(!e||e.target===document.getElementById('popup')){
    document.getElementById('popup').classList.remove('show');
  }
}

function revealAll(){
  const data=getExData();
  const scenario=data.scenarios[exCurrent];
  if(!exFound[exCurrent]) exFound[exCurrent]={};
  scenario.parts.forEach((part,idx)=>{
    if(part.clickable) exFound[exCurrent][idx]=true;
  });
  renderEx();
}

function exNext(){
  const total=getExData().scenarios.length;
  if(exCurrent<total-1){exCurrent++;renderEx();}
  else{exDone=true;renderExDone();}
}

function renderExDone(){
  const data=getExData();
  let html=renderLangBar();
  html+='<div class="done-screen">';
  html+='<div style="font-size:48px;margin-bottom:1rem;">✓</div>';
  html+='<h2>'+data.done_title+'</h2>';
  html+='<p>'+data.done_text+'</p>';
  html+='<button class="restart-btn" onclick="exRestart()">'+data.restart+'</button>';
  html+='</div>';
  document.getElementById('ex-app').innerHTML=html;
}

function exRestart(){exCurrent=0;exDone=false;exFound={};renderEx();}

renderQuiz();
</script>
</body>
</html>
